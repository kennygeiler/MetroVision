name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check:taxonomy
      - run: pnpm check:schema-drift
      - run: pnpm test
      - run: pnpm eval:smoke
      - name: Production build (same as pnpm test:build)
        run: pnpm test:build
      - run: pnpm check:worker
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python pipeline classify import smoke
        run: |
          pip install --quiet google-genai python-dotenv psycopg2-binary
          cd pipeline && python3 -c "import classify; import taxonomy; print('pipeline classify ok')"
