name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check:taxonomy
      - run: pnpm check:schema-drift
      - run: pnpm test
      - run: pnpm eval:smoke
      - name: Production build (no DB at build time)
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          NEXT_PUBLIC_SITE_URL: https://metrovision.vercel.app
      - run: pnpm check:worker
