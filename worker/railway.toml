# MetroVision ingest worker — SHARED monorepo: worker imports ../../src/lib and ../../src/db.
#
# Railway “Root Directory = worker” only uploads worker/ — parent src/ is MISSING → broken deploy.
#
# Configure the worker service:
# 1. Root Directory: leave EMPTY (repo root / “/”). Do NOT set “worker”.
# 2. Config as code file: /worker/railway.toml  (absolute path; config does not follow root dir).
# 3. Redeploy.
#
# Optional Docker image (full context): docker build -f docker/metrovision-worker.Dockerfile .

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter metrovision-worker build"
watchPatterns = [
  "worker/**",
  "src/lib/**",
  "src/db/**",
  "drizzle/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
preDeployCommand = ["pnpm db:migrate"]
startCommand = "pnpm --filter metrovision-worker start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
